name: Build and Release Electron App

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-2022, ubuntu-latest]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm dpkg fakeroot

      - name: Run Build and Publish to GitHub Releases
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      
      - name: Locate Generated .deb Installer
        if: matrix.os == 'ubuntu-latest'
        id: locate_deb
        run: |
          DEB_PATH=$(find out/make -name "*.deb" | head -n 1)
          echo "Found deb installer at: $DEB_PATH"
          echo "path=$DEB_PATH" >> $GITHUB_OUTPUT

      - name: Generate APT Repository Structure
        if: matrix.os == 'ubuntu-latest'
        uses: morph027/apt-repo-action@v3
        id: create-apt-repo
        with:
          repo-name: skyecord
          signing-key: ${{ secrets.APT_PRIVATE_KEY }}
          passphrase: ${{ secrets.APT_PASSPHRASE }}
          codename: stable
          components: main
          architectures: amd64
          # Connects to your live repository link to merge new updates safely
          import-from-repo-url: ""
          file: ${{ steps.locate_deb.outputs.path }}

      - name: Upload APT Repository Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.create-apt-repo.outputs.dir }}

  deploy_apt_repo:
    runs-on: ubuntu-latest
    needs: build_and_release
    steps:
      - name: Deploy Repository Infrastructure to GitHub Pages
        uses: actions/deploy-pages@v4
