<html>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="wow little jim, we communicatin over the innanet">
        <link rel="stylesheet" href="output.css">
        <link rel="manifest" href="manifest.json">
        <title>skyecord</title>
    </head>

    <body>
        <audio id="application" playsinline hidden></audio>
        <div class="flex justify-between items-center w-full bg-skye-gray-light mb-5 border-skye-gray-border border-2 text-[12px]">
            <p id="room-status" class="room-status">
                "<span id="room-name"></span>" ///// Room ID: <span id="room-id" class="overflow-x-auto"></span> 
                <br><br>
                <span id="user-count"></span> connected <br>

            </p>
        </div>
        <div id="users-wrapper" class="flex flex-col items-center justify-center">
            <p class="text-[14px] text-white underline">Users</p>
            <br>
            <div class="h-[40vh] w-[90%] overflow-y-auto border border-gray-300 p-4 bg-skye-gray-darker rounded">
                <ul id="user-list" class="flex flex-col gap-2"></ul>
            </div>
        </div>
        <div id="call-controls" class="flex  w-full bg-skye-gray-light mb-5 border-skye-gray-border border-2 text-[12px]">
            <button id="leave-room" class="p-2.5 ml-5 text-[16px] bg-skye-gray-dark text-white cursor-pointer hover:bg-skye-gray-hover"><img src="./svgicons/call_end.svg" alt="Leave Room"></button>
            <button id="mute-mic" class="p-2.5 ml-5 text-[16px] bg-skye-gray-dark text-white cursor-pointer hover:bg-skye-gray-hover"><img src="./svgicons/mic.svg" alt="Mute Microphone"></button>
            <button id="deafen-self" class="p-2.5 ml-5 text-[16px] bg-skye-gray-dark text-white cursor-pointer hover:bg-skye-gray-hover"><img src="./svgicons/media_output.svg" alt="Deafen Self"></button>
            <button id="screen-share" class="p-2.5 ml-5 text-[16px] bg-skye-gray-dark text-white cursor-pointer hover:bg-skye-gray-hover"><img src="./svgicons/screen_share.svg" alt="Start Screen Share"></button>
            <button id="video" class="p-2.5 ml-5 text-[16px] bg-skye-gray-dark text-white cursor-pointer hover:bg-skye-gray-hover" disabled><img src="./svgicons/video_camera.svg" alt="Start Video"></button>
        </div>

        <div id="self-controls" style="display:none;">
            <button class="self-controls-open p-1 text-[12px] bg-skye-gray-dark text-white cursor-pointer hover:bg-skye-gray-hover "><img src="./svgicons/settings.svg" alt="Self Controls" style="width:100%; height: 75%;"></button>
            <dialog id="self-controls-dialog" class="bg-skye-gray-dark text-white ml-5 ">
                <h2 class="text-[16px] mb-2.5">user settings</h2>
                <label for="nickname-input" class="text-[14px] mb-2.5">Nickname:</label>
                <input type="text" id="nickname-input" placeholder="Nickname" class="p-2.5 mb-2.5 w-full bg-skye-gray-light text-white rounded">
                <br><br>
                <button id="save-btn-self" class="p-2.5 ml-5 text-[16px] bg-skye-gray-dark text-white cursor-pointer hover:bg-skye-gray-hover">Save</button>
                <button type="button" class="self-controls-close p-2.5 ml-5 text-[16px] bg-skye-gray-dark text-white cursor-pointer hover:bg-skye-gray-hover">Close</button>
            </dialog>
        </div>

        <div id="other-controls" style="display:none;">
            <button class="other-controls-open p-1 text-[12px] bg-skye-gray-dark text-white cursor-pointer hover:bg-skye-gray-hover "><img src="./svgicons/settings.svg" alt="Other Controls" style="width:100%; height: 75%;"></button>
            <dialog id="other-controls-dialog" class="bg-skye-gray-dark text-white ml-5 ">
                <h2 class="text-[16px] mb-2.5">user settings</h2>

                <label for="user-volume" class="text-[14px] mb-2.5">User Volume:</label>
                <input type="range" id="user-volume" min="0" max="100"class="p-2.5 mb-2.5 w-full bg-skye-gray-light text-white rounded">

                <br><br>
                <button id="save-btn-other" class="p-2.5 ml-5 text-[16px] bg-skye-gray-dark text-white cursor-pointer hover:bg-skye-gray-hover">Save</button>
                <button type="button" class="other-controls-close p-2.5 ml-5 text-[16px] bg-skye-gray-dark text-white cursor-pointer hover:bg-skye-gray-hover">Close</button>
            </dialog>
        </div>
    </body>

    <script src="room.js" defer></script>
</html>
