name: Build and Release Electron App

on:
  push:
      branches:
        master

jobs:
  build_and_release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # Use separate virtual environments to natively build for each platform
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Speeds up execution by caching node_modules

      - name: Install Project Dependencies
        run: npm ci

      # Linux runner requires extra libraries to successfully build and run Electron heads
      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Run Build and Publish to GitHub Releases
        # The electron-forge publish command automatically triggers standard make targets first
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Provided automatically by GitHub Actions
